name: Exportar Power BI para TV

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  exportar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GIT_TOKEN }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests

      - name: Exportar páginas do Power BI
        env:
          PBI_USERNAME: ${{ secrets.PBI_USERNAME }}
          PBI_PASSWORD: ${{ secrets.PBI_PASSWORD }}
        run: python export_pbi.py

      - name: Commitar e publicar imagens
        run: |
          git config user.name "PBI Bot"
          git config user.email "bot@pbi-tv.com"
          git add docs/
          git diff --cached --quiet && echo "Sem alterações." || (
            git commit -m "Atualiza dashboard $(date '+%d/%m/%Y %H:%M')"
            git push
          )
