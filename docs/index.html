<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="300">
  <title>Dashboard TV</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
    img { max-width: 100%; max-height: 100vh; object-fit: contain; }
  </style>
</head>
<body>
  <img id="dash" src="pagina1.png" alt="Dashboard">
  <script>
    const pages = ['pagina1.png','pagina2.png','pagina3.png','pagina4.png'];
    let current = 0;
    const img = document.getElementById('dash');

    function nextPage() {
      current = (current + 1) % pages.length;
      img.src = pages[current] + '?t=' + Date.now();
    }

    // Troca de página a cada 15 segundos
    setInterval(nextPage, 15000);

    // Recarrega a imagem atual a cada 5 minutos (pega versão nova)
    setInterval(() => {
      img.src = pages[current] + '?t=' + Date.now();
    }, 300000);
  </script>
</body>
</html>
